# ============================================================
# railway.toml — Deploy Travel Chatbot bằng Docker
# ============================================================

[build]
builder = "DOCKERFILE"

[deploy]
# Không set startCommand — dùng CMD trong Dockerfile (đã shell-expand $PORT đúng).
# Railway truyền startCommand không qua shell nên "$PORT" sẽ không được expand.
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
