# Render Blueprint — Travel Chatbot (Docker)
# Để dùng: copy file này ra gốc repo (Render đọc render.yaml ở root),
# hoặc tạo Web Service thủ công trỏ Dockerfile = 06-lab-complete/Dockerfile.
services:
  - type: web
    name: travel-chatbot
    runtime: docker
    rootDir: 06-lab-complete
    region: singapore
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: "1.0.0"
      - key: CORS_ORIGINS
        value: "*"
      # Optional — để trống dùng rule-based offline
      - key: OPENAI_API_KEY
        sync: false
